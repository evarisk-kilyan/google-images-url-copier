<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .header-icon {
      font-size: 22px;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      line-height: 1.3;
    }

    .header p {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 14px 16px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toggle-label {
      font-size: 13px;
      color: #ccc;
    }

    .toggle {
      position: relative;
      width: 48px;
      height: 26px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 26px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .slider::before {
      content: '';
      position: absolute;
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background: #888;
      border-radius: 50%;
      transition: transform 0.3s, background 0.3s;
    }

    input:checked + .slider {
      background: #1b4d2e;
    }

    input:checked + .slider::before {
      transform: translateX(22px);
      background: #4ade80;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      background: #2a1a1a;
      color: #f87171;
      border: 1px solid #4a1a1a;
      transition: all 0.3s;
    }

    .status-badge.active {
      background: #0f2a1a;
      color: #4ade80;
      border-color: #1a4a2a;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .dot.pulse {
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .hint {
      margin-top: 14px;
      font-size: 11px;
      color: #555;
      line-height: 1.5;
      border-top: 1px solid #1e1e32;
      padding-top: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">🖼</div>
    <div>
      <h1>Google Images URL Copier</h1>
      <p>Copie l'URL au clic sur une image</p>
    </div>
  </div>

  <div class="card">
    <div class="toggle-row">
      <span class="toggle-label">Copie automatique</span>
      <label class="toggle">
        <input type="checkbox" id="toggleSwitch">
        <span class="slider"></span>
      </label>
    </div>
    <div class="status-badge" id="statusBadge">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">Désactivé</span>
    </div>
  </div>

  <p class="hint">
    Va sur <strong style="color:#aaa">Google Images</strong>, active le switch,
    puis clique sur une image — l'URL est copiée dans ton presse-papier.
  </p>

  <script src="popup.js"></script>
</body>
</html>
